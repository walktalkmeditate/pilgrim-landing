<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     width="1200"
     height="630">

  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Lato:ital,wght@0,300;1,300&display=swap');
    ]]></style>
  </defs>

  <!-- Parchment -->
  <rect width="1200" height="630" fill="#F6F1E6"/>

  <!-- The phrase — italic Cormorant -->
  <text x="600" y="360" text-anchor="middle"
        font-family="'Cormorant Garamond', 'EB Garamond', Georgia, 'Times New Roman', serif"
        font-size="160"
        font-weight="400"
        font-style="italic"
        fill="#3C2E24">You found one.</text>

  <!-- Domain watermark -->
  <text x="600" y="575" text-anchor="middle"
        font-family="'Lato', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="12"
        font-weight="300"
        letter-spacing="0.24em"
        fill="#A89B8A">pilgrimapp.org/found</text>

</svg>
