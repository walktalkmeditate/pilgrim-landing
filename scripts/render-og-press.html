<!DOCTYPE html>
<!--
  Renders assets/og-press.png (1200×630) via Chrome headless.

  From repo root:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless --disable-gpu --hide-scrollbars \
      --force-device-scale-factor=1 \
      --window-size=1200,670 \
      --screenshot=/tmp/og-press-raw.png \
      --virtual-time-budget=5000 \
      "file://$(pwd)/scripts/render-og-press.html"
    convert /tmp/og-press-raw.png -crop 1200x630+0+0 +repage assets/og-press.png

  Keep this file and assets/og-press.svg in sync when editing the mark.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Render og-press</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Lato:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #F6F1E6; }
    svg { display: block; width: 1200px; height: 630px; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <rect width="1200" height="630" fill="#F6F1E6"/>

    <text x="600" y="290" text-anchor="middle"
          font-family="'Cormorant Garamond', Georgia, serif"
          font-size="96"
          font-weight="400"
          font-style="italic"
          fill="#3C2E24">Walking saved</text>
    <text x="600" y="400" text-anchor="middle"
          font-family="'Cormorant Garamond', Georgia, serif"
          font-size="96"
          font-weight="400"
          font-style="italic"
          fill="#3C2E24">my creative life.</text>

    <text x="600" y="575" text-anchor="middle"
          font-family="'Lato', -apple-system, sans-serif"
          font-size="12"
          font-weight="300"
          letter-spacing="0.24em"
          fill="#A89B8A">pilgrimapp.org/press</text>
  </svg>
</body>
</html>
